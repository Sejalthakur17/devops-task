---
- name: Install MySQL
  apt:
    name:
      - mysql-server
      - python3-pymysql
    state: present
    update_cache: yes

- name: Create MySQL database
  community.mysql.mysql_db:
    name: sejalmysql
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: yes

- name: Create MySQL user
  community.mysql.mysql_user:
    name: sejaluser
    password: sejal123
    priv: "sejalmysql.*:ALL"
    host: "%"
    state: present
    login_unix_socket: /var/run/mysqld/mysqld.sock
  become: yes

- name: Insert sample row
  community.mysql.mysql_query:
    login_db: sejalmysql
    login_unix_socket: /var/run/mysqld/mysqld.sock
    query: |
      INSERT INTO users (name)
      SELECT 'Sejal DevOps'
      WHERE NOT EXISTS (
        SELECT 1 FROM users WHERE name='Sejal DevOps'
      )
  become: yes